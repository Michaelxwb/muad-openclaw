<svg xmlns="http://www.w3.org/2000/svg" width="2048" height="1368" viewBox="0 0 2048 1368" role="img" aria-labelledby="title desc">
  <title id="title">muad-openclaw 核心数据流（图 C）</title>
  <desc id="desc">6 条规范数据流，泳道式展示管理员 / Console / Runtime Pod / 外部四层之间的端到端链路，不再重复绘制组件卡片。</desc>
  <defs>
    <marker id="arrow-control" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="20" markerHeight="20" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,1 L9.5,5 L0,9 z" fill="#2563eb"/></marker>
    <marker id="arrow-message" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="20" markerHeight="20" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,1 L9.5,5 L0,9 z" fill="#16a34a"/></marker>
    <marker id="arrow-data" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="20" markerHeight="20" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,1 L9.5,5 L0,9 z" fill="#7c3aed"/></marker>
    <marker id="arrow-session" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="20" markerHeight="20" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,1 L9.5,5 L0,9 z" fill="#ea580c"/></marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%"><feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.10"/></filter>
    <style>
      .bg{fill:#f8fafc}
      .title{fill:#0f172a;font:700 40px Arial,"PingFang SC","Microsoft YaHei",sans-serif}
      .subtitle{fill:#475569;font:400 18px Arial,"PingFang SC","Microsoft YaHei",sans-serif}
      .label{fill:#0f172a;font:700 17px Arial,"PingFang SC","Microsoft YaHei",sans-serif}
      .small{fill:#475569;font:400 15px Arial,"PingFang SC","Microsoft YaHei",sans-serif}
      .tiny{fill:#64748b;font:400 14px Arial,"PingFang SC","Microsoft YaHei",sans-serif}
      .legend{fill:#334155;font:400 16px Arial,"PingFang SC","Microsoft YaHei",sans-serif}
      .flow-id{fill:#0f172a;font:700 18px Arial,"PingFang SC","Microsoft YaHei",sans-serif}
      .flow-name{fill:#475569;font:700 18px Arial,"PingFang SC","Microsoft YaHei",sans-serif}
      .node{stroke:#94a3b8;stroke-width:1.5;rx:8;filter:url(#shadow)}
      .control{fill:none;stroke:#2563eb;stroke-width:3;marker-end:url(#arrow-control)}
      .message{fill:none;stroke:#16a34a;stroke-width:3;marker-end:url(#arrow-message)}
      .data{fill:none;stroke:#7c3aed;stroke-width:3;marker-end:url(#arrow-data)}
      .session{fill:none;stroke:#ea580c;stroke-width:3;marker-end:url(#arrow-session)}
      .dash{stroke-dasharray:10 8}
      .thin{stroke-width:2.5}
      .swimlane{stroke:#cbd5e1;stroke-width:1;stroke-dasharray:6 4}
    </style>
  </defs>
  <rect class="bg" width="2048" height="1368"/>
  <text x="56" y="64" class="title">muad-openclaw 核心数据流（图 C）</text>
  <text x="56" y="96" class="subtitle">6 条规范数据流 · 泳道展示端到端链路 · 不重复绘制组件卡片（组件见 §5.1 / §5.3）</text>
  <g transform="translate(980 50)">
    <line x1="0" y1="8" x2="56" y2="8" class="control thin"/><text x="66" y="13" class="legend">控制链路</text>
    <line x1="130" y1="8" x2="186" y2="8" class="message thin"/><text x="196" y="13" class="legend">消息链路</text>
    <line x1="300" y1="8" x2="356" y2="8" class="data thin dash"/><text x="366" y="13" class="legend">数据 / 模型调用</text>
    <line x1="510" y1="8" x2="566" y2="8" class="session thin"/><text x="576" y="13" class="legend">持久化访问</text>
  </g>

  <!-- Swimlane headers -->
  <rect x="48" y="160" width="1952" height="76" fill="#eef6ff" stroke="#cbd5e1" stroke-width="1" rx="6"/>
  <text x="150" y="196" text-anchor="middle" class="section-title" fill="#2563eb">管理员</text>
  <line x1="280" y1="160" x2="280" y2="236" class="swimlane"/>
  <text x="500" y="196" text-anchor="middle" class="section-title" fill="#2563eb">Console 控制面</text>
  <line x1="720" y1="160" x2="720" y2="236" class="swimlane"/>
  <text x="1040" y="196" text-anchor="middle" class="section-title" fill="#16a34a">Runtime Pod</text>
  <line x1="1350" y1="160" x2="1350" y2="236" class="swimlane"/>
  <text x="1700" y="196" text-anchor="middle" class="section-title" fill="#7c3aed">外部 / 存储</text>

  <!-- DF-01 管理配置 -->
  <rect x="48" y="255" width="1952" height="150" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1" rx="8"/>
  <text x="80" y="310" class="flow-id">DF-01</text>
  <text x="80" y="335" class="flow-name">管理配置</text>
  <rect x="280" y="285" width="108" height="36" class="node" fill="#dbeafe"/><text x="334" y="308" text-anchor="middle" class="small">管理员</text>
  <line x1="388" y1="303" x2="440" y2="303" class="control"/>
  <rect x="450" y="280" width="130" height="46" class="node" fill="#dbeafe"/><text x="515" y="300" text-anchor="middle" class="small">Console</text><text x="515" y="316" text-anchor="middle" class="tiny">FE → API</text>
  <line x1="580" y1="303" x2="640" y2="303" class="control"/>
  <rect x="650" y="285" width="108" height="36" class="node" fill="#e2e8f0"/><text x="704" y="308" text-anchor="middle" class="small">SQLite</text>
  <line x1="758" y1="303" x2="810" y2="303" class="control"/>
  <rect x="820" y="280" width="130" height="46" class="node" fill="#dbeafe"/><text x="885" y="300" text-anchor="middle" class="small">Config</text><text x="885" y="316" text-anchor="middle" class="tiny">Builder</text>
  <line x1="950" y1="303" x2="1010" y2="303" class="control"/>
  <rect x="1020" y="285" width="108" height="36" class="node" fill="#dbeafe"/><text x="1074" y="308" text-anchor="middle" class="small">Apply</text>
  <line x1="1128" y1="303" x2="1180" y2="303" class="control"/>
  <rect x="1190" y="280" width="130" height="46" class="node" fill="#dbeafe"/><text x="1255" y="300" text-anchor="middle" class="small">Driver</text><text x="1255" y="316" text-anchor="middle" class="tiny">exec / stdin</text>
  <line x1="1320" y1="303" x2="1380" y2="303" class="control"/>
  <rect x="1390" y="280" width="150" height="46" class="node" fill="#dcfce7"/><text x="1465" y="300" text-anchor="middle" class="small">transaction</text><text x="1465" y="316" text-anchor="middle" class="tiny">prepare→commit</text>
  <line x1="1540" y1="303" x2="1600" y2="303" class="control"/>
  <rect x="1610" y="285" width="150" height="36" class="node" fill="#dcfce7"/><text x="1685" y="308" text-anchor="middle" class="small">openclaw.json</text>
  <text x="1850" y="308" class="tiny">失败 rollback + health 对齐 generation</text>

  <!-- DF-02 绑定 -->
  <rect x="48" y="420" width="1952" height="150" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1" rx="8"/>
  <text x="80" y="475" class="flow-id">DF-02</text>
  <text x="80" y="500" class="flow-name">绑定</text>
  <rect x="280" y="450" width="130" height="36" class="node" fill="#dcfce7"/><text x="345" y="473" text-anchor="middle" class="small">企微 /bind</text>
  <line x1="410" y1="468" x2="470" y2="468" class="message"/>
  <rect x="480" y="450" width="108" height="36" class="node" fill="#ffedd5"/><text x="534" y="473" text-anchor="middle" class="small">guard</text>
  <line x1="588" y1="468" x2="650" y2="468" class="data dash"/>
  <rect x="660" y="445" width="160" height="46" class="node" fill="#ede9fe"/><text x="740" y="465" text-anchor="middle" class="small">bindings</text><text x="740" y="481" text-anchor="middle" class="tiny">/activate</text>
  <line x1="820" y1="468" x2="880" y2="468" class="control"/>
  <rect x="890" y="450" width="108" height="36" class="node" fill="#dbeafe"/><text x="944" y="473" text-anchor="middle" class="small">Identity</text>
  <line x1="998" y1="468" x2="1060" y2="468" class="control"/>
  <rect x="1070" y="450" width="108" height="36" class="node" fill="#dbeafe"/><text x="1124" y="473" text-anchor="middle" class="small">apply</text>
  <text x="1250" y="473" class="tiny">未绑定不自动开户；绑定码预指向用户/Pod/channel</text>

  <!-- DF-03 任务对话 -->
  <rect x="48" y="585" width="1952" height="150" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1" rx="8"/>
  <text x="80" y="640" class="flow-id">DF-03</text>
  <text x="80" y="665" class="flow-name">任务对话</text>
  <rect x="280" y="615" width="108" height="36" class="node" fill="#dcfce7"/><text x="334" y="638" text-anchor="middle" class="small">企微</text>
  <line x1="388" y1="633" x2="440" y2="633" class="message"/>
  <rect x="450" y="615" width="108" height="36" class="node" fill="#dcfce7"/><text x="504" y="638" text-anchor="middle" class="small">Gateway</text>
  <line x1="558" y1="633" x2="610" y2="633" class="message"/>
  <rect x="620" y="615" width="108" height="36" class="node" fill="#dcfce7"/><text x="674" y="638" text-anchor="middle" class="small">bindings</text>
  <line x1="728" y1="633" x2="780" y2="633" class="message"/>
  <rect x="790" y="615" width="108" height="36" class="node" fill="#dcfce7"/><text x="844" y="638" text-anchor="middle" class="small">agent</text>
  <line x1="898" y1="633" x2="960" y2="633" class="data"/>
  <rect x="970" y="610" width="140" height="46" class="node" fill="#ede9fe"/><text x="1040" y="630" text-anchor="middle" class="small">LLM</text><text x="1040" y="646" text-anchor="middle" class="tiny">per-user</text>
  <line x1="1110" y1="633" x2="1170" y2="633" class="message"/>
  <rect x="1180" y="610" width="160" height="46" class="node" fill="#dcfce7"/><text x="1260" y="630" text-anchor="middle" class="small">native</text><text x="1260" y="646" text-anchor="middle" class="tiny">final reply</text>
  <line x1="1340" y1="633" x2="1400" y2="633" class="message dash"/>
  <text x="1410" y="638" class="small">→ IM</text>
  <text x="1530" y="638" class="tiny">进度旁路不替代 final reply；富媒体终态走原生链路</text>

  <!-- DF-04 Skill 执行 -->
  <rect x="48" y="750" width="1952" height="150" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1" rx="8"/>
  <text x="80" y="805" class="flow-id">DF-04</text>
  <text x="80" y="830" class="flow-name">Skill 执行</text>
  <rect x="280" y="780" width="120" height="36" class="node" fill="#ffedd5"/><text x="340" y="803" text-anchor="middle" class="small">run-skill</text>
  <line x1="400" y1="798" x2="460" y2="798" class="control"/>
  <rect x="470" y="780" width="108" height="36" class="node" fill="#fef3c7"/><text x="524" y="803" text-anchor="middle" class="small">脚本执行</text>
  <!-- branch: progress side-channel -->
  <line x1="578" y1="780" x2="578" y2="798" class="message thin"/>
  <rect x="520" y="736" width="116" height="36" class="node" fill="#fef3c7"/><text x="578" y="759" text-anchor="middle" class="small">muad-progress</text>
  <line x1="636" y1="754" x2="710" y2="754" class="message"/>
  <rect x="720" y="736" width="140" height="36" class="node" fill="#fef3c7"/><text x="790" y="759" text-anchor="middle" class="small">adapters → IM</text>
  <!-- main path continues -->
  <line x1="578" y1="816" x2="640" y2="816" class="data dash"/>
  <rect x="650" y="802" width="160" height="28" class="node" fill="#ede9fe"/><text x="730" y="821" text-anchor="middle" class="small">skill-executions</text>
  <line x1="810" y1="816" x2="870" y2="816" class="data dash"/>
  <rect x="880" y="802" width="100" height="28" class="node" fill="#e2e8f0"/><text x="930" y="821" text-anchor="middle" class="small">SQLite</text>
  <text x="1050" y="821" class="tiny">Console 不可用时写 State outbox，恢复后幂等重放</text>

  <!-- DF-05 平台会话 -->
  <rect x="48" y="915" width="1952" height="150" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1" rx="8"/>
  <text x="80" y="970" class="flow-id">DF-05</text>
  <text x="80" y="995" class="flow-name">平台会话</text>
  <rect x="280" y="945" width="108" height="36" class="node" fill="#ffedd5"/><text x="334" y="968" text-anchor="middle" class="small">Skill</text>
  <line x1="388" y1="963" x2="450" y2="963" class="data"/>
  <rect x="460" y="940" width="180" height="46" class="node" fill="#ffedd5"/><text x="550" y="960" text-anchor="middle" class="small">session-manager</text><text x="550" y="976" text-anchor="middle" class="tiny">get-state</text>
  <line x1="640" y1="963" x2="710" y2="963" class="data dash"/>
  <rect x="720" y="940" width="180" height="46" class="node" fill="#ede9fe"/><text x="810" y="960" text-anchor="middle" class="small">resolve</text><text x="810" y="976" text-anchor="middle" class="tiny">service token + decrypt</text>
  <line x1="900" y1="963" x2="970" y2="963" class="session"/>
  <rect x="980" y="940" width="200" height="46" class="node" fill="#ffedd5"/><text x="1080" y="960" text-anchor="middle" class="small">adapter → session-store</text><text x="1080" y="976" text-anchor="middle" class="tiny">Cookie / storageState</text>
  <text x="1280" y="968" class="tiny">业务 Skill 一对一绑定平台（MSSW / SDSP）；密钥不进 Skill 脚本</text>

  <!-- DF-06 审计告警 -->
  <rect x="48" y="1080" width="1952" height="120" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1" rx="8"/>
  <text x="80" y="1130" class="flow-id">DF-06</text>
  <text x="80" y="1155" class="flow-name">审计告警</text>
  <rect x="280" y="1110" width="380" height="36" class="node" fill="#e2e8f0"/><text x="470" y="1133" text-anchor="middle" class="small">操作审计 · Guard health · apply 状态 · 执行日志</text>
  <line x1="660" y1="1128" x2="730" y2="1128" class="session"/>
  <rect x="740" y="1110" width="180" height="36" class="node" fill="#e2e8f0"/><text x="830" y="1133" text-anchor="middle" class="small">SQLite · Collector 告警</text>
  <text x="1000" y="1133" class="tiny">执行记录只存摘要与脱敏错误；Collector 读取 Guard health 触发 generation mismatch / unhealthy 告警</text>

  <!-- Swimlane bottom border -->
  <line x1="280" y1="1220" x2="280" y2="160" class="swimlane"/>
  <line x1="720" y1="1220" x2="720" y2="160" class="swimlane"/>
  <line x1="1350" y1="1220" x2="1350" y2="160" class="swimlane"/>
</svg>
