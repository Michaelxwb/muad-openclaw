<svg xmlns="http://www.w3.org/2000/svg" width="2048" height="1368" viewBox="0 0 2048 1368" role="img" aria-labelledby="title desc">
  <title id="title">muad-openclaw 核心数据流图</title>
  <desc id="desc">管理员配置应用、IM 消息路由、Skill 执行、平台凭证与审计落库，对齐 Runtime DTO apply 与 native final reply。</desc>
  <defs>
    <marker id="arrow-control" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="20" markerHeight="20" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,1 L9.5,5 L0,9 z" fill="#2563eb"/></marker>
    <marker id="arrow-message" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="20" markerHeight="20" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,1 L9.5,5 L0,9 z" fill="#16a34a"/></marker>
    <marker id="arrow-data" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="20" markerHeight="20" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,1 L9.5,5 L0,9 z" fill="#7c3aed"/></marker>
    <marker id="arrow-session" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="20" markerHeight="20" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,1 L9.5,5 L0,9 z" fill="#ea580c"/></marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%"><feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.14"/></filter>
    <style>
      .bg{fill:#f8fafc}.title{fill:#0f172a;font:700 44px Arial,"PingFang SC","Microsoft YaHei",sans-serif}.subtitle{fill:#475569;font:400 22px Arial,"PingFang SC","Microsoft YaHei",sans-serif}.section-title{fill:#0f172a;font:700 26px Arial,"PingFang SC","Microsoft YaHei",sans-serif}.label{fill:#0f172a;font:700 20px Arial,"PingFang SC","Microsoft YaHei",sans-serif}.small{fill:#475569;font:400 16px Arial,"PingFang SC","Microsoft YaHei",sans-serif}.tiny{fill:#64748b;font:400 15px Arial,"PingFang SC","Microsoft YaHei",sans-serif}.legend{fill:#334155;font:400 18px Arial,"PingFang SC","Microsoft YaHei",sans-serif}.area{stroke:#cbd5e1;stroke-width:2;rx:28}.card{stroke:#94a3b8;stroke-width:2;rx:18;filter:url(#shadow)}.inner{stroke:#cbd5e1;stroke-width:2;rx:14}.control{fill:none;stroke:#2563eb;stroke-width:4;marker-end:url(#arrow-control)}.message{fill:none;stroke:#16a34a;stroke-width:4;marker-end:url(#arrow-message)}.data{fill:none;stroke:#7c3aed;stroke-width:4;marker-end:url(#arrow-data)}.session{fill:none;stroke:#ea580c;stroke-width:4;marker-end:url(#arrow-session)}.dash{stroke-dasharray:12 10}.thin{stroke-width:3}
    </style>
  </defs>
  <rect class="bg" width="2048" height="1368"/>
  <text x="72" y="76" class="title">muad-openclaw 核心数据流</text>
  <text x="72" y="116" class="subtitle">配置 apply · 绑定 · 企微任务 · run-skill / progress / session-manager · 审计（对应 tools 诉求 B/C/D/E）</text>
  <g transform="translate(1000 52)">
    <line x1="0" y1="8" x2="64" y2="8" class="control thin"/>
    <text x="76" y="14" class="legend">控制链路</text>
    <line x1="200" y1="8" x2="264" y2="8" class="message thin"/>
    <text x="276" y="14" class="legend">消息链路</text>
    <line x1="400" y1="8" x2="464" y2="8" class="data thin dash"/>
    <text x="476" y="14" class="legend">数据 / 模型调用</text>
    <line x1="660" y1="8" x2="724" y2="8" class="session thin"/>
    <text x="736" y="14" class="legend">持久化访问</text>
  </g>

  <!-- 1 config -->
  <rect x="48" y="160" width="1952" height="250" class="area" fill="#eef6ff" stroke="#2563eb"/>
  <text x="80" y="204" class="section-title" fill="#2563eb">1. 管理员配置流（generation apply）</text>
  <rect x="80" y="250" width="130" height="72" class="card" fill="#dbeafe"/><text x="145" y="294" text-anchor="middle" class="label">管理员</text>
  <rect x="250" y="250" width="150" height="72" class="card" fill="#dbeafe"/><text x="325" y="294" text-anchor="middle" class="label">Console 前端</text>
  <rect x="440" y="250" width="150" height="72" class="card" fill="#dbeafe"/><text x="515" y="294" text-anchor="middle" class="label">Console API</text>
  <rect x="630" y="250" width="130" height="72" class="card" fill="#e2e8f0"/><text x="695" y="294" text-anchor="middle" class="label">SQLite</text>
  <rect x="800" y="250" width="180" height="72" class="card" fill="#dbeafe"/><text x="890" y="280" text-anchor="middle" class="label">Config Builder</text><text x="890" y="306" text-anchor="middle" class="small">RuntimeConfigV1</text>
  <rect x="1020" y="250" width="170" height="72" class="card" fill="#dbeafe"/><text x="1105" y="294" text-anchor="middle" class="label">Apply</text>
  <rect x="1230" y="250" width="160" height="72" class="card" fill="#dbeafe"/><text x="1310" y="280" text-anchor="middle" class="label">Driver</text><text x="1310" y="306" text-anchor="middle" class="small">exec / stdin</text>
  <rect x="1430" y="250" width="240" height="72" class="card" fill="#dbeafe"/><text x="1550" y="280" text-anchor="middle" class="label">transaction.mjs</text><text x="1550" y="306" text-anchor="middle" class="small">prepare→commit</text>
  <rect x="1710" y="250" width="240" height="72" class="card" fill="#dcfce7"/><text x="1830" y="280" text-anchor="middle" class="label">openclaw.json</text><text x="1830" y="306" text-anchor="middle" class="small">+ agent guidance</text>
  <path d="M210 286 L250 286" class="control"/><path d="M400 286 L440 286" class="control"/><path d="M590 286 L630 286" class="control"/><path d="M760 286 L800 286" class="control"/><path d="M980 286 L1020 286" class="control"/><path d="M1190 286 L1230 286" class="control"/><path d="M1390 286 L1430 286" class="control"/><path d="M1670 286 L1710 286" class="control"/>
  <text x="80" y="360" class="tiny">失败：rollback + last_apply_status=failed；健康检查对齐 generation</text>

  <!-- 2 message -->
  <rect x="48" y="450" width="1952" height="360" class="area" fill="#ecfdf5" stroke="#16a34a"/>
  <text x="80" y="494" class="section-title" fill="#16a34a">2. IM 消息路由与 Agent 执行流</text>
  <rect x="80" y="540" width="200" height="80" class="card" fill="#dcfce7"/><text x="180" y="572" text-anchor="middle" class="label">企微 / 微信</text><text x="180" y="600" text-anchor="middle" class="small">用户消息</text>
  <rect x="330" y="540" width="210" height="80" class="card" fill="#dcfce7"/><text x="435" y="572" text-anchor="middle" class="label">Gateway</text><text x="435" y="600" text-anchor="middle" class="small">消息入口</text>
  <rect x="590" y="540" width="210" height="80" class="card" fill="#dcfce7"/><text x="695" y="572" text-anchor="middle" class="label">bindings / routes</text><text x="695" y="600" text-anchor="middle" class="small">Identity 匹配</text>
  <rect x="850" y="540" width="210" height="80" class="card" fill="#dcfce7"/><text x="955" y="572" text-anchor="middle" class="label">业务 Agent</text><text x="955" y="600" text-anchor="middle" class="small">Human User 上下文</text>
  <rect x="1120" y="520" width="200" height="70" class="card" fill="#ede9fe"/><text x="1220" y="550" text-anchor="middle" class="label">LLM</text><text x="1220" y="576" text-anchor="middle" class="small">per-user model</text>
  <rect x="1120" y="610" width="200" height="70" class="card" fill="#dcfce7"/><text x="1220" y="640" text-anchor="middle" class="label">muad-run-skill</text><text x="1220" y="666" text-anchor="middle" class="small">Skill 执行</text>
  <rect x="1380" y="540" width="200" height="80" class="card" fill="#ffedd5"/><text x="1480" y="572" text-anchor="middle" class="label">muad-progress</text><text x="1480" y="600" text-anchor="middle" class="small">独立进度消息</text>
  <rect x="1640" y="540" width="300" height="80" class="card" fill="#dcfce7"/><text x="1790" y="572" text-anchor="middle" class="label">native final reply</text><text x="1790" y="600" text-anchor="middle" class="small">文本/附件/卡片 → IM</text>
  <path d="M280 580 L330 580" class="message"/><path d="M540 580 L590 580" class="message"/><path d="M800 580 L850 580" class="message"/>
  <!-- 问题一：Agent 右缘 → LLM / run-skill 左缘（曲线，端点贴边，run-skill 一定接到） -->
  <path d="M1060 555 C1080 540, 1100 540, 1120 555" class="data"/>
  <path d="M1060 600 C1080 630, 1100 645, 1120 645" class="message"/>
  <!-- run-skill → progress → final reply（曲线） -->
  <path d="M1320 645 C1345 620, 1360 580, 1380 580" class="message"/>
  <path d="M1580 580 L1640 580" class="message"/>
  <path d="M1790 620 C1790 700, 400 700, 280 620" class="message dash"/>
  <text x="80" y="720" class="tiny">未绑定：main agent /bind → Guard → POST /internal/v1/bindings/activate（不在主业务路径上）</text>
  <text x="80" y="750" class="tiny">进度旁路不替代 final reply；富媒体终态仍走 OpenClaw 原生回复链路</text>
  <text x="80" y="780" class="tiny">Guard 负责绑定门禁 / 模型门禁 / browser lease / 文件边界，不负责 peer→agent 路由</text>

  <!-- 3 skill credential audit -->
  <rect x="48" y="850" width="1952" height="440" class="area" fill="#fff7ed" stroke="#ea580c"/>
  <text x="80" y="894" class="section-title" fill="#ea580c">3. Skill / 凭证 / 审计与持久化</text>
  <rect x="80" y="950" width="320" height="100" class="card" fill="#ffedd5"/><text x="240" y="990" text-anchor="middle" class="label">State PVC</text><text x="240" y="1020" text-anchor="middle" class="small">workspace / session-store / outbox</text>
  <rect x="440" y="950" width="240" height="100" class="card" fill="#ffedd5"/><text x="560" y="990" text-anchor="middle" class="label">Public Skills</text><text x="560" y="1020" text-anchor="middle" class="small">只读 skill 根</text>
  <rect x="720" y="950" width="280" height="100" class="card" fill="#ede9fe"/><text x="860" y="990" text-anchor="middle" class="label">session-manager</text><text x="860" y="1020" text-anchor="middle" class="small">get-state / adapter</text>
  <rect x="1040" y="950" width="320" height="100" class="card" fill="#ede9fe"/><text x="1200" y="980" text-anchor="middle" class="label">Console resolver</text><text x="1200" y="1008" text-anchor="middle" class="small">/internal/v1/session-credentials/resolve</text><text x="1200" y="1032" text-anchor="middle" class="small">service token + decrypt</text>
  <rect x="1400" y="950" width="280" height="100" class="card" fill="#dbeafe"/><text x="1540" y="980" text-anchor="middle" class="label">skill-executions</text><text x="1540" y="1008" text-anchor="middle" class="small">/internal/v1/skill-executions</text><text x="1540" y="1032" text-anchor="middle" class="small">run-skill 上报</text>
  <rect x="1720" y="950" width="240" height="100" class="card" fill="#e2e8f0"/><text x="1840" y="990" text-anchor="middle" class="label">SQLite 审计</text><text x="1840" y="1020" text-anchor="middle" class="small">execution + audit_log</text>
  <rect x="80" y="1110" width="1880" height="120" class="inner" fill="#ffffff"/>
  <text x="110" y="1150" class="small">业务平台仅 MSSW、SDSP；每个业务 Skill 与唯一平台一对一绑定，经 session-manager 取该平台 session/storageState</text>
  <text x="110" y="1185" class="small">执行记录只存摘要与脱敏错误；Console 不可用时写 State outbox，恢复后幂等重放</text>
  <!-- 问题二：run-skill 向下两条紫线均为虚线；橙线为 State/Public 持久化（保持 session 色） -->
  <path d="M1220 680 C900 820, 400 900, 240 950" class="session"/>
  <path d="M1220 680 C900 860, 700 920, 560 950" class="session"/>
  <path d="M1220 680 C1000 860, 900 920, 860 950" class="data dash"/>
  <path d="M1220 680 C1400 800, 1500 900, 1540 950" class="data dash"/>
  <!-- 第 3 区横向 -->
  <path d="M1000 1000 L1040 1000" class="data"/>
  <path d="M1360 1000 L1400 1000" class="data"/>
  <path d="M1680 1000 L1720 1000" class="data"/>
</svg>
