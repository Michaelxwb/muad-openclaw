<svg xmlns="http://www.w3.org/2000/svg" width="2048" height="1024" viewBox="0 0 2048 1024" role="img" aria-labelledby="title desc">
  <title id="title">muad-openclaw 核心数据流（图 C）</title>
  <desc id="desc">6 条规范数据流，泳道式展示管理员 / Console / Runtime Pod / 外部四层之间的端到端链路，不重复绘制组件卡片（组件见 §5.1 / §5.3）。</desc>
  <defs>
    <marker id="arrow-control" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="20" markerHeight="20" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,1 L9.5,5 L0,9 z" fill="#2563eb"/></marker>
    <marker id="arrow-message" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="20" markerHeight="20" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,1 L9.5,5 L0,9 z" fill="#16a34a"/></marker>
    <marker id="arrow-data" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="20" markerHeight="20" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,1 L9.5,5 L0,9 z" fill="#7c3aed"/></marker>
    <marker id="arrow-session" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="20" markerHeight="20" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,1 L9.5,5 L0,9 z" fill="#ea580c"/></marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%"><feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.08"/></filter>
    <style>
      .bg{fill:#f8fafc}
      .title{fill:#0f172a;font:700 38px Arial,"PingFang SC","Microsoft YaHei",sans-serif}
      .subtitle{fill:#475569;font:400 18px Arial,"PingFang SC","Microsoft YaHei",sans-serif}
      .section-title{fill:#0f172a;font:700 22px Arial,"PingFang SC","Microsoft YaHei",sans-serif}
      .label{fill:#0f172a;font:700 18px Arial,"PingFang SC","Microsoft YaHei",sans-serif}
      .small{fill:#475569;font:400 15px Arial,"PingFang SC","Microsoft YaHei",sans-serif}
      .tiny{fill:#64748b;font:400 14px Arial,"PingFang SC","Microsoft YaHei",sans-serif}
      .legend{fill:#334155;font:400 16px Arial,"PingFang SC","Microsoft YaHei",sans-serif}
      .flow-id{fill:#0f172a;font:700 17px Arial,"PingFang SC","Microsoft YaHei",sans-serif}
      .flow-name{fill:#475569;font:700 17px Arial,"PingFang SC","Microsoft YaHei",sans-serif}
      .node{stroke:#94a3b8;stroke-width:1.5;rx:6;filter:url(#shadow)}
      .control{fill:none;stroke:#2563eb;stroke-width:3;marker-end:url(#arrow-control)}
      .message{fill:none;stroke:#16a34a;stroke-width:3;marker-end:url(#arrow-message)}
      .data{fill:none;stroke:#7c3aed;stroke-width:3;marker-end:url(#arrow-data)}
      .session{fill:none;stroke:#ea580c;stroke-width:3;marker-end:url(#arrow-session)}
      .dash{stroke-dasharray:10 8}
      .thin{stroke-width:2.5}
      .swimlane{stroke:#cbd5e1;stroke-width:1;stroke-dasharray:6 4}
    </style>
  </defs>
  <rect class="bg" width="2048" height="1024"/>
  <text x="56" y="56" class="title">muad-openclaw 核心数据流（图 C）</text>
  <text x="56" y="84" class="subtitle">6 条规范数据流 · 泳道展示端到端链路 · 不重复绘制组件卡片（组件见 §5.1 / §5.3）</text>
  <g transform="translate(980 44)">
    <line x1="0" y1="8" x2="52" y2="8" class="control thin"/><text x="62" y="13" class="legend">控制</text>
    <line x1="120" y1="8" x2="172" y2="8" class="message thin"/><text x="182" y="13" class="legend">消息</text>
    <line x1="270" y1="8" x2="322" y2="8" class="data thin dash"/><text x="332" y="13" class="legend">数据/模型</text>
    <line x1="460" y1="8" x2="512" y2="8" class="session thin"/><text x="522" y="13" class="legend">持久化</text>
  </g>

  <!-- Swimlane headers -->
  <rect x="48" y="130" width="1952" height="58" fill="#eef6ff" stroke="#cbd5e1" stroke-width="1" rx="6"/>
  <text x="150" y="158" text-anchor="middle" class="section-title" fill="#2563eb">管理员</text>
  <text x="500" y="158" text-anchor="middle" class="section-title" fill="#2563eb">Console 控制面</text>
  <text x="1040" y="158" text-anchor="middle" class="section-title" fill="#16a34a">Runtime Pod</text>
  <text x="1700" y="158" text-anchor="middle" class="section-title" fill="#7c3aed">外部 / 存储</text>

  <!-- DF-01 管理配置 -->
  <rect x="48" y="205" width="1952" height="115" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1" rx="6"/>
  <text x="80" y="250" class="flow-id">DF-01</text>
  <text x="80" y="272" class="flow-name">管理配置</text>
  <rect x="280" y="235" width="100" height="28" class="node" fill="#dbeafe"/><text x="330" y="254" text-anchor="middle" class="small">管理员</text>
  <line x1="380" y1="249" x2="430" y2="249" class="control"/>
  <rect x="440" y="230" width="120" height="38" class="node" fill="#dbeafe"/><text x="500" y="247" text-anchor="middle" class="small">Console</text><text x="500" y="260" text-anchor="middle" class="tiny">FE → API</text>
  <line x1="560" y1="249" x2="610" y2="249" class="control"/>
  <rect x="620" y="235" width="100" height="28" class="node" fill="#e2e8f0"/><text x="670" y="254" text-anchor="middle" class="small">SQLite</text>
  <line x1="720" y1="249" x2="770" y2="249" class="control"/>
  <rect x="780" y="230" width="110" height="38" class="node" fill="#dbeafe"/><text x="835" y="247" text-anchor="middle" class="small">Config</text><text x="835" y="260" text-anchor="middle" class="tiny">Builder</text>
  <line x1="890" y1="249" x2="940" y2="249" class="control"/>
  <rect x="950" y="235" width="90" height="28" class="node" fill="#dbeafe"/><text x="995" y="254" text-anchor="middle" class="small">Apply</text>
  <line x1="1040" y1="249" x2="1090" y2="249" class="control"/>
  <rect x="1100" y="230" width="120" height="38" class="node" fill="#dbeafe"/><text x="1160" y="247" text-anchor="middle" class="small">Driver</text><text x="1160" y="260" text-anchor="middle" class="tiny">exec / stdin</text>
  <line x1="1220" y1="249" x2="1270" y2="249" class="control"/>
  <rect x="1280" y="230" width="130" height="38" class="node" fill="#dcfce7"/><text x="1345" y="247" text-anchor="middle" class="small">transaction</text><text x="1345" y="260" text-anchor="middle" class="tiny">prepare→commit</text>
  <line x1="1410" y1="249" x2="1460" y2="249" class="control"/>
  <rect x="1470" y="235" width="130" height="28" class="node" fill="#dcfce7"/><text x="1535" y="254" text-anchor="middle" class="small">openclaw.json</text>
  <text x="1680" y="254" class="tiny">失败 rollback + health 对齐 generation</text>

  <!-- DF-02 绑定 -->
  <rect x="48" y="335" width="1952" height="115" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1" rx="6"/>
  <text x="80" y="380" class="flow-id">DF-02</text>
  <text x="80" y="402" class="flow-name">绑定</text>
  <rect x="280" y="370" width="110" height="28" class="node" fill="#dcfce7"/><text x="335" y="389" text-anchor="middle" class="small">企微 /bind</text>
  <line x1="390" y1="384" x2="440" y2="384" class="message"/>
  <rect x="450" y="370" width="90" height="28" class="node" fill="#ffedd5"/><text x="495" y="389" text-anchor="middle" class="small">guard</text>
  <line x1="540" y1="384" x2="590" y2="384" class="data dash"/>
  <rect x="600" y="365" width="140" height="38" class="node" fill="#ede9fe"/><text x="670" y="382" text-anchor="middle" class="small">bindings</text><text x="670" y="395" text-anchor="middle" class="tiny">/activate</text>
  <line x1="740" y1="384" x2="790" y2="384" class="control"/>
  <rect x="800" y="370" width="90" height="28" class="node" fill="#dbeafe"/><text x="845" y="389" text-anchor="middle" class="small">Identity</text>
  <line x1="890" y1="384" x2="940" y2="384" class="control"/>
  <rect x="950" y="370" width="80" height="28" class="node" fill="#dbeafe"/><text x="990" y="389" text-anchor="middle" class="small">apply</text>
  <text x="1120" y="389" class="tiny">未绑定不自动开户；绑定码预指向用户/Pod/channel</text>

  <!-- DF-03 任务对话 -->
  <rect x="48" y="465" width="1952" height="115" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1" rx="6"/>
  <text x="80" y="510" class="flow-id">DF-03</text>
  <text x="80" y="532" class="flow-name">任务对话</text>
  <rect x="280" y="500" width="80" height="28" class="node" fill="#dcfce7"/><text x="320" y="519" text-anchor="middle" class="small">企微</text>
  <line x1="360" y1="514" x2="400" y2="514" class="message"/>
  <rect x="410" y="500" width="80" height="28" class="node" fill="#dcfce7"/><text x="450" y="519" text-anchor="middle" class="small">Gateway</text>
  <line x1="490" y1="514" x2="530" y2="514" class="message"/>
  <rect x="540" y="500" width="80" height="28" class="node" fill="#dcfce7"/><text x="580" y="519" text-anchor="middle" class="small">agent</text>
  <line x1="620" y1="514" x2="660" y2="514" class="data"/>
  <rect x="670" y="495" width="110" height="38" class="node" fill="#ede9fe"/><text x="725" y="512" text-anchor="middle" class="small">LLM / Skill</text><text x="725" y="525" text-anchor="middle" class="tiny">per-user model</text>
  <line x1="780" y1="514" x2="820" y2="514" class="message"/>
  <rect x="830" y="495" width="130" height="38" class="node" fill="#dcfce7"/><text x="895" y="512" text-anchor="middle" class="small">native</text><text x="895" y="525" text-anchor="middle" class="tiny">final reply</text>
  <line x1="960" y1="514" x2="1000" y2="514" class="message"/>
  <rect x="1010" y="500" width="80" height="28" class="node" fill="#dcfce7"/><text x="1050" y="519" text-anchor="middle" class="small">IM 回复</text>
  <text x="1160" y="519" class="tiny">进度旁路不替代 final reply；富媒体终态走原生链路。agent → LLM 或 agent → run-skill（详见 DF-04）</text>

  <!-- DF-04 Skill 执行 -->
  <rect x="48" y="595" width="1952" height="115" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1" rx="6"/>
  <text x="80" y="640" class="flow-id">DF-04</text>
  <text x="80" y="662" class="flow-name">Skill 执行</text>
  <rect x="280" y="635" width="100" height="28" class="node" fill="#ffedd5"/><text x="330" y="654" text-anchor="middle" class="small">run-skill</text>
  <line x1="380" y1="649" x2="420" y2="649" class="control"/>
  <rect x="430" y="635" width="90" height="28" class="node" fill="#fef3c7"/><text x="475" y="654" text-anchor="middle" class="small">脚本执行</text>
  <line x1="520" y1="649" x2="560" y2="649" class="control"/>
  <rect x="570" y="635" width="90" height="28" class="node" fill="#ffedd5"/><text x="615" y="654" text-anchor="middle" class="small">③ session</text>
  <text x="730" y="654" class="tiny">Skill → session-manager → resolve → session-store（平台登录态，详见 DF-05）</text>
  <!-- 进度旁路：从脚本往下 -->
  <line x1="475" y1="663" x2="475" y2="685" class="message thin"/>
  <rect x="390" y="688" width="110" height="28" class="node" fill="#fef3c7"/><text x="445" y="707" text-anchor="middle" class="small">muad-progress</text>
  <line x1="500" y1="702" x2="540" y2="702" class="message"/>
  <rect x="550" y="688" width="120" height="28" class="node" fill="#fef3c7"/><text x="610" y="707" text-anchor="middle" class="small">adapters → IM</text>
  <line x1="670" y1="702" x2="710" y2="702" class="session"/>
  <rect x="720" y="688" width="90" height="28" class="node" fill="#e2e8f0"/><text x="765" y="707" text-anchor="middle" class="small">outbox</text>
  <text x="880" y="707" class="tiny">Console 不可用时写 State outbox，恢复后幂等重放</text>

  <!-- DF-05 平台会话 -->
  <rect x="48" y="725" width="1952" height="115" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1" rx="6"/>
  <text x="80" y="770" class="flow-id">DF-05</text>
  <text x="80" y="792" class="flow-name">平台会话</text>
  <rect x="280" y="765" width="80" height="28" class="node" fill="#ffedd5"/><text x="320" y="784" text-anchor="middle" class="small">Skill</text>
  <line x1="360" y1="779" x2="410" y2="779" class="data"/>
  <rect x="420" y="760" width="160" height="38" class="node" fill="#ffedd5"/><text x="500" y="777" text-anchor="middle" class="small">session-manager</text><text x="500" y="790" text-anchor="middle" class="tiny">get-state</text>
  <line x1="580" y1="779" x2="630" y2="779" class="data dash"/>
  <rect x="640" y="760" width="160" height="38" class="node" fill="#ede9fe"/><text x="720" y="777" text-anchor="middle" class="small">resolve</text><text x="720" y="790" text-anchor="middle" class="tiny">token + decrypt</text>
  <line x1="800" y1="779" x2="850" y2="779" class="session"/>
  <rect x="860" y="760" width="180" height="38" class="node" fill="#ffedd5"/><text x="950" y="777" text-anchor="middle" class="small">adapter → session-store</text><text x="950" y="790" text-anchor="middle" class="tiny">Cookie / storageState</text>
  <text x="1120" y="784" class="tiny">业务 Skill 一对一绑定平台（MSSW / SDSP）；密钥不进 Skill 脚本</text>

  <!-- DF-06 审计告警 -->
  <rect x="48" y="855" width="1952" height="100" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1" rx="6"/>
  <text x="80" y="895" class="flow-id">DF-06</text>
  <text x="80" y="917" class="flow-name">审计告警</text>
  <rect x="280" y="885" width="360" height="28" class="node" fill="#e2e8f0"/><text x="460" y="904" text-anchor="middle" class="small">操作审计 · Guard health · apply 状态 · 执行日志</text>
  <line x1="640" y1="899" x2="690" y2="899" class="session"/>
  <rect x="700" y="885" width="170" height="28" class="node" fill="#e2e8f0"/><text x="785" y="904" text-anchor="middle" class="small">SQLite · Collector 告警</text>
  <text x="940" y="904" class="tiny">执行只存摘要与脱敏错误；Collector 读取 Guard health 触发 mismatch / unhealthy 告警</text>

  <!-- Swimlane dividers -->
  <line x1="260" y1="130" x2="260" y2="960" class="swimlane"/>
  <line x1="700" y1="130" x2="700" y2="960" class="swimlane"/>
  <line x1="1340" y1="130" x2="1340" y2="960" class="swimlane"/>
</svg>
