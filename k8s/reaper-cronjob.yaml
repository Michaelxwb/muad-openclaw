# 控制面 ④：每天跑一次 reaper，回收 >10 天无活动的用户实例（状态归档不丢）。
# 需要一个有 statefulset scale / pod get 权限的 ServiceAccount（下面带最小 RBAC）。
# 默认 DRY_RUN=true 只报告；确认无误后改为 "false" 真回收。
apiVersion: v1
kind: ServiceAccount
metadata: { name: muad-reaper }
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata: { name: muad-reaper }
rules:
  - apiGroups: ["apps"]
    resources: ["statefulsets", "statefulsets/scale"]
    verbs: ["get", "list", "update", "patch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  # 归档/restore（TODO-B）若用临时 Job 挂 PVC，再补 jobs/pvc 权限
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata: { name: muad-reaper }
roleRef: { apiGroup: rbac.authorization.k8s.io, kind: Role, name: muad-reaper }
subjects: [{ kind: ServiceAccount, name: muad-reaper }]
---
apiVersion: batch/v1
kind: CronJob
metadata: { name: muad-reaper }
spec:
  schedule: "0 3 * * *"          # 每天 03:00
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: muad-reaper
          restartPolicy: Never
          containers:
            - name: reaper
              image: bitnami/kubectl:latest   # 自带 kubectl；reaper.sh 经 ConfigMap 挂入
              command: ["/bin/bash", "/scripts/reaper.sh"]
              env:
                - { name: MUAD_NS, value: "default" }
                - { name: MUAD_IDLE_DAYS, value: "10" }
                - { name: DRY_RUN, value: "true" }   # 验证期 true；上线改 "false"
              volumeMounts: [{ name: scripts, mountPath: /scripts }]
          volumes:
            - name: scripts
              configMap: { name: muad-reaper-script }   # kubectl create configmap muad-reaper-script --from-file=reaper.sh
