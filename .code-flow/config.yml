version: 1

budget:
    total: 2500
    l0_max: 800
    l1_max: 1700
    map_max: 400
    # catalog 模式下 spec 目录的 token 上限（超出按 Tier1 优先截断并告警）
    catalog_max: 200

inject:
    auto: true
    # 注入模式：
    #   catalog — UserPromptSubmit 仅注入极小 spec 目录（每 spec 一行适用场景），
    #             由模型按语义自行 Read 相关 spec 全文；prompt 含明确文件路径且
    #             命中 domain 时仍直接注入完整约束。PreToolUse 不受影响（编辑时
    #             始终强制注入完整约束兜底）。
    #   full    — 旧行为：UserPromptSubmit 按 tag 词表匹配注入完整 spec。
    # 仅 literal "catalog" 启用目录模式；缺失/其他值一律 full（升级用户行为不变）。
    mode: catalog

# 质量闭环（v0.5）：合规反馈 + 学习采集。
# enabled 仅 literal true 启用（缺失即关闭，升级用户行为不变）；
# 子开关缺省跟随 enabled，仅 literal false 单独关闭。
# 数据仅存本地 .code-flow/（.session-log.jsonl / .check-state.json）。
quality_loop:
    enabled: true
    post_check: true            # PostToolUse 违规反馈（只提示不阻断）
    stop_check: true            # Stop 收尾按 validation.yml 校验
    correction_capture: true    # 纠正句式采集（喂 cf-learn 候选）
    # 注入时对 spec 内容做保守无损压缩（去行尾空白、折叠多空行、剥 HTML 注释、去重 bullet）
    # 缺省视为 true；仅显式 false 关闭
    compress: true
    # UserPromptSubmit 去重窗口：同一 spec 在最近 N 个 prompt 内不重复注入。
    # 0 或负数 关闭去重（每次都注入，等同旧行为）；缺省 5。
    # 窗口"限速"而非"永久跳过"，超过 N 个 prompt 后会再次注入，保证 auto-compaction
    # 丢掉早期上下文后仍能恢复 spec。
    dedup_window: 5
    code_extensions:
        - ".py"
        - ".ts"
        - ".tsx"
        - ".js"
        - ".jsx"
        - ".go"
        - ".java"
        - ".rs"
        - ".rb"
        - ".vue"
        - ".svelte"
    skip_extensions:
        - ".md"
        - ".txt"
        - ".json"
        - ".yml"
        - ".yaml"
        - ".toml"
        - ".lock"
        - ".csv"
        - ".xml"
        - ".svg"
        - ".png"
        - ".jpg"
        - ".jpeg"
        - ".gif"
        - ".ico"
        - ".pdf"
        - ".zip"
        - ".gz"
        - ".tar"
    skip_paths:
        - "docs/**"
        - "*.config.*"
        - ".code-flow/**"
        - ".claude/**"
        - ".costrict/**"
        - "node_modules/**"
        - "dist/**"
        - "build/**"
        - "out/**"
        - "coverage/**"
        - ".next/**"
        - ".cache/**"
        - ".venv/**"
        - "venv/**"
        - "__pycache__/**"
        - ".git/**"

path_mapping:
    shared:
        # 共享模板供 cf-task:align / cf-task:prd 命令显式 Read 使用，
        # 不是约束规范，禁止通配符自动注入。
        # 仅 _map.md 保持 "*" 作为 Tier 0 导航。
        specs:
            - path: "shared/_map.md"
              tags: ["*"]
              tier: 0
            - path: "shared/prd-template.md"
              tags: []          # 永不自动注入，仅 cf-task:prd 命令显式 Read
              tier: 1
            - path: "shared/design/design-lite.md"
              tags: []          # 永不自动注入，仅 cf-task:align 命令显式 Read
              tier: 1
            - path: "shared/design/design-full.md"
              tags: []          # 永不自动注入，仅 cf-task:align 命令显式 Read
              tier: 1
            - path: "shared/design/design-frontend.md"
              tags: []          # 永不自动注入，仅 cf-task:align 命令显式 Read（前端设计模板）
              tier: 1
    frontend:
        patterns:
            - "src/components/**"
            - "src/pages/**"
            - "src/hooks/**"
            - "src/styles/**"
            - "**/*.tsx"
            - "**/*.jsx"
            - "**/*.css"
            - "**/*.scss"
        specs:
            - path: "frontend/_map.md"
              tags: ["*"]
              tier: 0
            - path: "frontend/directory-structure.md"
              tags: ["directory", "structure", "folder", "route", "page", "layout"]
              tier: 1
            - path: "frontend/quality-standards.md"
              tags: ["quality", "type", "lint", "error", "test", "state", "strict"]
              tier: 1
            - path: "frontend/component-specs.md"
              tags: ["component", "prop", "hook", "render", "ui", "style"]
              tier: 1
    backend:
        patterns:
            - "services/**"
            - "api/**"
            - "models/**"
            - "*.py"
            - "**/*.py"
            - "**/*.go"
        specs:
            - path: "backend/_map.md"
              tags: ["*"]
              tier: 0
            - path: "backend/directory-structure.md"
              tags: ["directory", "structure", "folder", "module", "layout"]
              tier: 1
            - path: "backend/logging.md"
              tags: ["log", "logging", "debug", "trace", "monitor", "observe"]
              tier: 1
            - path: "backend/database.md"
              tags: ["database", "db", "sql", "orm", "model", "migration", "query", "table", "schema"]
              tier: 1
            - path: "backend/platform-rules.md"
              tags: ["api", "deploy", "config", "version", "compatibility", "release", "flag"]
              tier: 1
            - path: "backend/code-quality-performance.md"
              tags: ["quality", "performance", "error", "exception", "test", "timeout", "retry", "cache"]
              tier: 1
