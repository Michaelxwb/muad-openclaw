version: 1

spec_workflow:
  schema_version: 1
  enforcement: required
  drift_check: true
  scope_expansion_check: true
  metrics: true
  catalog:
    dedup_window: 5

budget:
  total: 2500
  l0_max: 800
  l1_max: 1700
  map_max: 400
  catalog_max: 200

quality_loop:
  enabled: true
  post_check: true
  stop_check: true
  correction_capture: true
  compress: true
  code_extensions:
    - .py
    - .ts
    - .tsx
    - .js
    - .jsx
    - .mjs
    - .cjs
    - .go
    - .java
    - .rs
    - .rb
    - .vue
    - .svelte
  skip_extensions:
    - .md
    - .txt
    - .json
    - .yml
    - .yaml
    - .toml
    - .lock
    - .csv
    - .xml
    - .svg
    - .png
    - .jpg
    - .jpeg
    - .gif
    - .ico
    - .pdf
    - .zip
    - .gz
    - .tar
  skip_paths:
    - docs/**
    - "*.config.*"
    - .code-flow/**
    - .claude/**
    - .codex/**
    - .costrict/**
    - .opencode/**
    - .agents/**
    - node_modules/**
    - dist/**
    - build/**
    - out/**
    - coverage/**
    - .next/**
    - .cache/**
    - .venv/**
    - venv/**
    - __pycache__/**
    - .git/**
    - console/backend/logs/**
    - console/backend/data/**
    - console/frontend/dist/**

path_mapping:
  shared:
    specs:
      - path: shared/_map.md
        tags: ["*"]
        tier: 0
      - path: shared/prd-template.md
        tags: []
        tier: 1
      - path: shared/design/design-lite.md
        tags: []
        tier: 1
      - path: shared/design/design-full.md
        tags: []
        tier: 1
      - path: shared/design/design-frontend.md
        tags: []
        tier: 1

  frontend:
    patterns:
      - console/frontend/src/**
      - console/frontend/test/**
      - console/frontend/*.ts
      - console/frontend/*.js
      - console/frontend/*.mjs
      - console/frontend/**/*.tsx
      - console/frontend/**/*.ts
      - console/frontend/**/*.js
      - console/frontend/**/*.css
      - console/frontend/**/*.module.css
    specs:
      - path: frontend/_map.md
        tags: ["*"]
        tier: 0
      - path: frontend/directory-structure.md
        tags: [directory, structure, folder, route, page, layout]
        tier: 1
      - path: frontend/quality-standards.md
        tags: [quality, type, lint, error, test, state, strict]
        tier: 1
      - path: frontend/component-specs.md
        tags: [component, prop, hook, render, ui, style]
        tier: 1

  backend:
    patterns:
      - console/backend/**
      - console/backend/**/*.go
    specs:
      - path: backend/_map.md
        tags: ["*"]
        tier: 0
      - path: backend/directory-structure.md
        tags: [directory, structure, folder, module, layout]
        tier: 1
      - path: backend/logging.md
        tags: [log, logging, debug, trace, monitor, observe]
        tier: 1
      - path: backend/database.md
        tags: [database, db, sql, orm, model, migration, query, table, schema, sqlite]
        tier: 1
      - path: backend/platform-rules.md
        tags: [api, deploy, config, version, compatibility, release, flag, pod, skill]
        tier: 1
      - path: backend/code-quality-performance.md
        tags: [quality, performance, error, exception, test, timeout, retry, cache]
        tier: 1

  runtime:
    patterns:
      - bin/**
      - tools/**
      - skills/**
      - seed/**
      - k8s/**
      - Dockerfile
      - entrypoint.sh
      - provision-user.sh
      - compose.template.yml
      - "**/*.mjs"
    specs:
      - path: runtime/_map.md
        tags: ["*"]
        tier: 0
      - path: runtime/directory-structure.md
        tags: [directory, structure, folder, module, layout, skill]
        tier: 1
      - path: runtime/isolation-and-security.md
        tags: [security, isolation, secret, credential, token, env, multi-user]
        tier: 1
      - path: runtime/config-and-apply.md
        tags: [config, transaction, apply, generation, restart, health]
        tier: 1
      - path: runtime/skill-execution.md
        tags: [skill, execution, progress, telemetry, concurrency, session]
        tier: 1
