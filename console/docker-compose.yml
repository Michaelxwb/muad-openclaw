# muad 控制台 compose（使用 GHCR 远程镜像）。
#
# 用法：
#   1) 复制 config.example.yaml → config.yaml，填 masterKey / adminPassword 等
#   2) docker compose up -d
#   3) 浏览器开 http://<host>:18080，用 adminUser / adminPassword 登录
#
# 所有运行时配置（含机密）走 config.yaml——本文件运行时只读挂进容器，已 gitignore、
# 不入镜像（NFR-SEC-02）。改控制台镜像版本 / 宿主端口直接编辑下面的 image / ports。
# 控制台用 DockerDriver 起每用户容器：挂宿主 docker.sock，并与用户容器同在 muad-net 网络。
name: muad-console

services:
  console:
    image: ghcr.io/michaelxwb/muad-console:latest
    container_name: muad-console
    restart: unless-stopped
    environment:
      # 唯一配置入口：指向下方挂载的 config.yaml（其余配置全在该文件里）
      CONSOLE_CONFIG: /etc/muad-console/config.yaml
    ports:
      # 宿主端口:容器端口（容器内固定 8080，对应 config.yaml 的 listenAddr）
      - "18080:8080"
    volumes:
      # 唯一配置源（含机密），只读挂载——不入镜像
      - ./config.yaml:/etc/muad-console/config.yaml:ro
      # DockerDriver 通过宿主 docker.sock 起/管用户容器（RISK-03：等价 root）
      - /var/run/docker.sock:/var/run/docker.sock
      # 控制台 SQLite 持久化（用户/LLM/审计/管理员）
      - muad-console-data:/var/lib/muad-console
    networks:
      - muad-net

volumes:
  muad-console-data:

networks:
  # 共享网络 muad-net：用户容器（控制台 DockerDriver 用 --network muad-net 在 compose
  # 之外创建）与控制台同网，按容器名 muad-oc-<user>:18789 互通。声明为 external，
  # 首次部署前需手动创建一次：  docker network create muad-net
  muad-net:
    name: muad-net
    external: true
