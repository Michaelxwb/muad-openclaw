# muad 控制台配置（唯一配置源；env 可选覆盖：env > yaml > 内置默认值）
# 复制为 config.yaml 后按需修改。config.yaml 含机密，已 gitignore、运行时挂载、不入镜像。

# AES-GCM 加密主密钥（派生加密 DB 内凭证的 key）。生成：openssl rand -hex 32
masterKey: ""

# 初始管理员密码（首启幂等引导；用户名见下方 adminUser）
adminPassword: ""

# 运行时驱动："docker" 或 "k8s"（默认 docker）
runtimeDriver: docker

# 建容器时默认使用的 openclaw 镜像
defaultImage: ghcr.io/michaelxwb/muad-openclaw:latest

# 共享 docker 网络名（控制台与用户容器互通）
muadNet: muad-net

# 共享 skill 目录（只读挂进每个用户容器）
skillsDir: /opt/muad/skills

# 监听地址（集群/宿主机用 0.0.0.0:8080）
listenAddr: ":8080"

# 可选日志目录；配置后同时输出 stdout 和 <logDir>/YYYY-MM-DD/console.log
# logDir: /var/lib/muad-console/logs

# SQLite 数据库路径（挂卷持久化）
dbPath: /var/lib/muad-console/console.db

# Worker Pod 通过内部网络访问 Console internal API 的地址
consoleInternalURL: http://muad-console:8080

# JWT session token 签名密钥（留空默认复用 masterKey）
# jwtSecret: ""

# 初始管理员用户名（首启引导，幂等）
adminUser: "admin"

# 采集间隔（秒，默认 30）
collectIntervalSec: 30

# 单 Pod 未配置覆写时使用的非敏感运行时默认值。
# 可由 CONSOLE_RUNTIME_* 环境变量覆盖。
runtimeDefaults:
  maxSkillConcurrency: 2
  maxBrowserConcurrency: 2
  browserCDPPortStart: 18802
  browserCDPPortEnd: 65535
