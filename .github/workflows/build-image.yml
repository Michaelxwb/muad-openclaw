name: build-image

# 推送 git tag（v*）即构建镜像并推到 GHCR：ghcr.io/<owner>/muad-openclaw:<tag>
# 例：git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      openclaw_version:
        description: 'openclaw 基础镜像版本（ghcr.io/openclaw/openclaw:<tag>）'
        default: '2026.6.10'

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/muad-openclaw

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata（tag → 镜像标签）
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            OPENCLAW_VERSION=${{ inputs.openclaw_version || '2026.6.10' }}
