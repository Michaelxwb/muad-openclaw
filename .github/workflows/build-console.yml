name: build-console

# 推送 console-v* tag 即构建控制台镜像并推到 GHCR：
#   ghcr.io/<owner>/muad-console:<version>
# 例：git tag console-v0.1.0 && git push origin console-v0.1.0
# （与 openclaw 工作镜像的 v* tag 区分，互不触发）
on:
  push:
    tags: ['console-v*']
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/muad-console

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata（console-v<x> → 镜像标签 <x>）
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=match,pattern=console-v(.*),group=1
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/console-v') }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: console
          file: console/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
